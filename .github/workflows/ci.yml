name: CI

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  repository:
    name: Repository checks
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Check repository layout
        shell: bash
        run: |
          test -f README.md
          test -f LICENSE.md
          test -f CHANGELOG.md
          test -f .github/workflows/publish-python.yml
          test -f R/lpcde/DESCRIPTION
          test -f R/lpcde/tests/testthat/test-numerical-regression.R
          test -f R/lpcde/tests/fixtures/replication-r-smoke.csv
          test -f replication/lpcde_illustration.R
          test -f replication/lpcde_replication.R
          test -f replication/lpcde_comparison.R
          test -f replication/lpcde_illustration.py
          test -f replication/lpcde_replication.py
          test -f replication/lpcde_illustration.do
          test -f replication/lpcde_replication.do
          test -f Python/lpcde/pyproject.toml
          test -f Python/lpcde/requirements.txt
          test -f Python/lpcde_illustration.py
          test -f Python/lpcde/src/lpcde/lpcde.py
          test -f Python/lpcde/src/lpcde/lpcde_fn.py
          test -f Python/lpcde/src/lpcde/lpbwcde.py
          test -f Python/lpcde/src/lpcde/lpbwcde_fn.py
          test -f Python/lpcde/src/lpcde/_validation.py
          test -f Python/lpcde/tests/test_numerical_alignment.py
          test -f Python/lpcde/tests/fixtures/r-baseline-output.csv
          test -f stata/lpcde.ado
          test -f stata/lpbwcde.ado
          test -f stata/lpcde.sthlp
          test -f stata/lpbwcde.sthlp
          test -f stata/lpcde.pdf
          test -f stata/lpbwcde.pdf
          test -f stata/lpcde.pkg
          test -f stata/stata.toc
          test -f stata/lpcde_fun.do
          test -f stata/lpcde_illustration.do
          test -f stata/tests/test-numerical-baseline.do
          test -f stata/tests/fixtures/lpcde-fixed-baseline.csv

  python-build:
    name: Python build
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.14"

      - name: Install build tools
        run: python -m pip install --upgrade pip build pytest

      - name: Install Python package
        run: python -m pip install -e Python/lpcde

      - name: Check Python package
        run: |
          python -m compileall -q Python/lpcde/src/lpcde
          python -c "import lpcde; print('lpcde import OK')"
          python -m pytest Python/lpcde/tests

      - name: Build Python package
        run: python -m build Python/lpcde

  r-check:
    name: R CMD check
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up R
        uses: r-lib/actions/setup-r@v2
        with:
          use-public-rspm: true

      - name: Set up Pandoc
        uses: r-lib/actions/setup-pandoc@v2

      - name: Install R dependencies
        run: |
          repos <- c(RSPM = Sys.getenv("RSPM"), CRAN = "https://cloud.r-project.org")
          install.packages(
            c(
              "Rcpp",
              "RcppArmadillo",
              "ggplot2",
              "purrr",
              "MASS",
              "mvtnorm",
              "combinat",
              "Matrix",
              "Rdpack",
              "testthat",
              "covr"
            ),
            repos = repos
          )
        shell: Rscript {0}

      - name: Build R source package
        run: R CMD build R/lpcde

      - name: Check R package
        run: R CMD check lpcde_*.tar.gz --no-manual
