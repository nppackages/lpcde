name: CI

on:
  push:
    branches: [ codecov ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:


jobs:

  R:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v2
      - run: sudo apt-get update
      - run: sudo apt -y install pandoc
      - run: sudo apt -y install r-base
      - run: mkdir R_packages/
      - run: Rscript -e 'install.packages(c("igraph", "Matrix", "RSpectra", "covr", "knitr", "mclust", "rmarkdown", "testthat", "devtools", "spam", "roxygen2", "qpdf"), lib="./R_packages/")'
      - run: cd R/lpcde/ && Rscript -e '.libPaths("../../R_packages/"); library(covr); cov = package_coverage(); to_cobertura(cov)'
      - uses: codecov/codecov-action@v2
        with:
          files: ./R/cobertura.xml
          fail_ci_if_error: true
          verbose: true
